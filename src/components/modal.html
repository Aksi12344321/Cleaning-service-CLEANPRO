<!-- Общий контейнер попапа -->
<div class="modal" id="calcModal">
    <!-- Темный фон (оверлей) -->
    <div class="modal__overlay"></div>
    
    <!-- Белая плашка с контентом -->
    <div class="modal__content">
        <!-- Кнопка закрытия -->
        <button class="modal__close" aria-label="Закрыть">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- === БЛОК 1: САМА ФОРМА === -->
        <div class="modal__form-wrapper">
            <h3 class="modal__title">Рассчитать стоимость</h3>
            <p class="modal__subtitle">Оставьте заявку, и мы перезвоним за 5 минут</p>
            
            <form class="form" id="calcForm">
                <input type="hidden" name="service_name" value="Общая заявка">
                <div class="form__group">
                    <input type="text" name="user_name" class="form__input" placeholder="Ваше имя">
                </div>
                <div class="form__group">
                    <input type="tel" name="user_phone" class="form__input" placeholder="+7 (___) ___-__-__">
                </div>
                <div class="form__group">
                    <input type="email" name="user_email" class="form__input" placeholder="Ваша электронная почта">
                </div>
                <div class="form__group">
                    <textarea name="user_message" class="form__textarea" placeholder="Опишите, что нужно убрать..."></textarea>
                </div>

                <div class="form__consents">
                    <label class="form__checkbox-label">
                        <input type="checkbox" name="consent_data" class="form__checkbox" required>
                        <span class="form__checkbox-custom"></span>
                        <span>Даю согласие на обработку <a href="./policy.html">персональных данных</a></span>
                    </label>
                    <label class="form__checkbox-label">
                        <input type="checkbox" name="consent_ads" class="form__checkbox">
                        <span class="form__checkbox-custom"></span>
                        <span>Согласен(-на) на получение рекламных материалов</span>
                    </label>
                </div>

                <button type="submit" class="btn btn--primary form__btn">Отправить заявку</button>
            </form>
        </div>

        <!-- === БЛОК 2: УСПЕШНАЯ ОТПРАВКА === -->
        <div class="modal__success">
            <div class="modal__leaf--left modal__leaf">
                <svg width="60" height="80" viewBox="0 0 60 80" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M30 0C30 0 60 20 60 50C60 65 45 80 30 80C15 80 0 65 0 50C0 20 30 0 30 0Z" fill="#4ade80" opacity="0.2"/><path d="M30 10V75M15 35L30 50M45 35L30 50" stroke="#22c55e" stroke-width="2" opacity="0.5"/></svg>
            </div>
            <div class="modal__leaf--right modal__leaf">
                <svg width="50" height="70" viewBox="0 0 50 70" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M25 0C25 0 50 15 50 42C50 56 38 70 25 70C12 70 0 56 0 42C0 15 25 0 25 0Z" fill="#4ade80" opacity="0.15"/><path d="M25 8V65M12 30L25 43M38 30L25 43" stroke="#22c55e" stroke-width="2" opacity="0.4"/></svg>
            </div>

            <div class="modal__success-grid">
                <div class="modal__success-info">
                    <h3 class="modal__success-title">Спасибо за заявку!</h3>
                    <p class="modal__success-text">Чтобы получить скидку 10%, назовите менеджеру промокод <span class="modal__promo-highlight">'SAVE10'</span>.</p>
                </div>
                <div class="modal__success-visual">
                    <div class="modal__book">
                        <div class="modal__book-spine"></div>
                        <span class="modal__book-title">МАГНИТНАЯ<br>УБОРКА</span>
                    </div>
                    <div class="modal__sticker">
                        <p>ПРОМОКОД <b>SAVE10</b> НА СКИДКУ 10%</p>
                        <div class="modal__sticker-badge">-10%</div>
                    </div>
                </div>
            </div>

            <div class="modal__success-actions">
                <a href="https://t.me/твой_юзернейм" target="_blank" class="btn btn--wa">БОНУС В ТЕЛЕГРАМ</a>
                <a href="./" class="btn btn--site">ВЕРНУТЬСЯ НА САЙТ</a>
            </div>

            <div class="modal__success-footer">
                <span>CleanPro © 2026</span>
                <a href="./policy.html">Политика конфиденциальности</a>
            </div>
        </div>
    </div>
</div>
